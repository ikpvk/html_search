<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiger - Animal Wiki</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="nav-pane">
        <h2>Animal Wiki</h2>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="lion.html">Lion</a></li>
            <li><a href="tiger.html">Tiger</a></li>
            <li><a href="bear.html">Bear</a></li>
        </ul>
    </nav>

    <main class="main-content">
        <h1 id="animal-title"></h1>
        <p id="animal-description" class="intro"></p>
    </main>

    <script src="animals.js"></script>
    <script>
        function loadAnimalData() {
            const currentFile = window.location.pathname.split('/').pop() || 'index.html';
            const animal = animalsData.find(a => a.file === currentFile);

            if (animal) {
                document.getElementById('animal-title').textContent = animal.name;
                document.getElementById('animal-description').textContent = animal.description;
                document.title = animal.name + ' - Animal Wiki';

                const links = document.querySelectorAll('.nav-pane a');
                links.forEach(link => {
                    if (link.getAttribute('href') === currentFile) {
                        link.classList.add('active');
                    } else {
                        link.classList.remove('active');
                    }
                });
            }
        }

        loadAnimalData();
    </script>
</body>
</html>
