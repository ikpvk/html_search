<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animal Wiki</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <button class="hamburger" id="hamburger">☰</button>
    <nav class="nav-pane" id="nav-pane">
        <h2>Animal Wiki</h2>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="animal.html#lion">Lion</a></li>
            <li><a href="animal.html#tiger">Tiger</a></li>
            <li><a href="animal.html#bear">Bear</a></li>
        </ul>
    </nav>

    <main class="main-content">
        <h1 id="animal-title"></h1>
        <p id="animal-description" class="intro"></p>
    </main>

    <script src="animals.js"></script>
    <script>
        function loadAnimalData() {
            const hash = window.location.hash.slice(1);
            const animal = animalsData.find(a => a.file === hash + '.html');

            if (animal) {
                document.getElementById('animal-title').textContent = animal.name;
                document.getElementById('animal-description').textContent = animal.description;
                document.title = animal.name + ' - Animal Wiki';

                const links = document.querySelectorAll('.nav-pane a');
                links.forEach(link => {
                    const href = link.getAttribute('href');
                    if (href === hash + '.html' || href === 'animal.html#' + hash) {
                        link.classList.add('active');
                    } else {
                        link.classList.remove('active');
                    }
                });
            }
        }

        const hamburger = document.getElementById('hamburger');
        const navPane = document.getElementById('nav-pane');

        hamburger.addEventListener('click', function() {
            navPane.classList.toggle('open');
        });

        window.addEventListener('hashchange', loadAnimalData);

        loadAnimalData();
    </script>
</body>
</html>
